version: '3.8'

services:
  # Database (MariaDB)
  mariadb:
    image: mariadb:11.2
    container_name: ventauri-merch-db-dev
    restart: unless-stopped
    env_file:
      - ./.env
      - ./stripe.env
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ventauri_merch
      MYSQL_USER: local
      MYSQL_PASSWORD: development
    ports:
      - "3306:3306"
    volumes:
      - mariadb_dev_data:/var/lib/mysql
    networks:
      - ventauri-dev-network
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --max-connections=200
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3

  # Backend (Go/Gin API)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ventauri-merch-backend-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./stripe.env
    environment:
      - PORT=8080
      - MARIADB_HOST=mariadb
      - MARIADB_PORT=3306
      - MARIADB_USER=local
      - MARIADB_PASSWORD=development
      - MARIADB_DATABASE=ventauri_merch
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://localhost:3000
      - GIN_MODE=release
    volumes:
      - ./backend:/app
      - go_mod_cache:/go/pkg/mod
    networks:
      - ventauri-dev-network
    depends_on:
      mariadb:
        condition: service_healthy
    command: >
      sh -c "go mod download && 
             go install github.com/air-verse/air@latest && 
             air"

  # Frontend (React/Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ventauri-merch-frontend-dev
    env_file:
      - ./frontend/.env
      - ./stripe.env
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:8080
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - ventauri-dev-network
    depends_on:
      - backend
    command: bun run dev --host 0.0.0.0

volumes:
  mariadb_dev_data:
    driver: local
  go_mod_cache:
    driver: local

networks:
  ventauri-dev-network:
    driver: bridge