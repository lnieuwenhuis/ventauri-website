version: '3.8'

services:
  mariadb:
    image: mariadb:11.2
    container_name: ventauri-merch-db-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: ventauri_merch
      MYSQL_USER: ${MARIADB_USER}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_prod_data:/var/lib/mysql
    networks:
      - ventauri-prod-network
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=512M
      --max-connections=200
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 60s
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: ventauri-merch-backend-prod
    restart: unless-stopped
    environment:
      - PORT=8080
      - MARIADB_HOST=mariadb
      - MARIADB_PORT=3306
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_DATABASE=ventauri_merch
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - GIN_MODE=release
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - VITE_BACKEND_URL=${VITE_BACKEND_URL}
      - GOOGLE_USERINFO_URL=${GOOGLE_USERINFO_URL}
      - BACKEND_URL=${BACKEND_URL}
    networks:
      - ventauri-prod-network
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      start_period: 90s
      interval: 15s
      timeout: 10s
      retries: 6

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_BACKEND_URL=${VITE_BACKEND_URL}
    container_name: ventauri-merch-frontend-prod
    restart: unless-stopped
    networks:
      - ventauri-prod-network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      start_period: 15s
      interval: 30s
      timeout: 5s
      retries: 3

  # SSL Certificate Management
  certbot:
    image: certbot/certbot:latest
    container_name: ventauri-merch-certbot
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./ssl/www:/var/www/certbot
    command: >
      sh -c "certbot certonly --webroot 
             --webroot-path=/var/www/certbot 
             --email ventaurivnt@gmail.com 
             --agree-tos 
             --no-eff-email 
             --force-renewal 
             -d ventaurivnt.com 
             -d www.ventaurivnt.com"
    depends_on:
      nginx:
        condition: service_healthy

  # Auto-renewal service
  certbot-renew:
    image: certbot/certbot:latest
    container_name: ventauri-merch-certbot-renew
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./ssl/www:/var/www/certbot
    command: >
      sh -c "while :; do 
               sleep 12h & wait $${!}; 
               certbot renew --webroot --webroot-path=/var/www/certbot; 
             done"
    depends_on:
      nginx:
        condition: service_healthy
      certbot:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: ventauri-merch-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/templates:ro
      - ./nginx/entrypoint.sh:/etc/nginx/entrypoint.sh:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./ssl/www:/var/www/certbot:ro
    entrypoint:
      - /bin/sh
      - -c
      - "tr -d '\r' < /etc/nginx/entrypoint.sh > /tmp/entrypoint.sh && /bin/sh /tmp/entrypoint.sh"
    networks:
      - ventauri-prod-network
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mariadb_prod_data:
    driver: local

networks:
  ventauri-prod-network:
    driver: bridge