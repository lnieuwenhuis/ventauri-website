version: '3.8'

services:
  mariadb:
    image: mariadb:11.2
    container_name: ventauri-merch-db-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ventauri_merch
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_prod_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ventauri-prod-network
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=512M
      --max-connections=200
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: ventauri-merch-backend-prod
    restart: unless-stopped
    environment:
      - PORT=8080
      - MARIADB_HOST=mariadb
      - MARIADB_PORT=3306
      - MARIADB_USER=${DB_USER}
      - MARIADB_PASSWORD=${DB_PASSWORD}
      - MARIADB_DATABASE=ventauri_merch
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - GIN_MODE=release
    networks:
      - ventauri-prod-network
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/health"]
      start_period: 30s
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_BACKEND_URL=${VITE_BACKEND_URL}
    container_name: ventauri-merch-frontend-prod
    restart: unless-stopped
    networks:
      - ventauri-prod-network
    depends_on:
      backend:
        condition: service_healthy

  # SSL Certificate Management
  certbot:
    image: certbot/certbot:latest
    container_name: ventauri-merch-certbot
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./ssl/www:/var/www/certbot
    command: >
      sh -c "certbot certonly --webroot 
             --webroot-path=/var/www/certbot 
             --email ${SSL_EMAIL} 
             --agree-tos 
             --no-eff-email 
             --force-renewal 
             -d ${DOMAIN} 
             -d www.${DOMAIN}"
    depends_on:
      - nginx

  # Auto-renewal service
  certbot-renew:
    image: certbot/certbot:latest
    container_name: ventauri-merch-certbot-renew
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./ssl/www:/var/www/certbot
    command: >
      sh -c "while :; do 
               sleep 12h & wait $${!}; 
               certbot renew --webroot --webroot-path=/var/www/certbot; 
               nginx -s reload; 
             done"
    depends_on:
      - nginx
      - certbot

  nginx:
    image: nginx:alpine
    container_name: ventauri-merch-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./ssl/www:/var/www/certbot:ro
    networks:
      - ventauri-prod-network
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mariadb_prod_data:
    driver: local

networks:
  ventauri-prod-network:
    driver: bridge